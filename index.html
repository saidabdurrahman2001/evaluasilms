<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LMS Schedule — PCPM BI 40</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container py-4 py-lg-5">
      <div class="glass p-4 p-lg-5">
        <div class="d-flex flex-column flex-lg-row gap-3 align-items-start align-items-lg-center justify-content-between">
          <div>
            <div class="d-flex align-items-center gap-3">
              <div class="brand-mark rounded-4 p-3">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M7 7h10M7 12h10M7 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M4 4h16v16H4V4Z" stroke="currentColor" stroke-width="2" opacity=".65"/>
                </svg>
              </div>
              <div>
                <h1 class="h3 mb-1 brand">LMS Schedule</h1>
                <div class="subtle">PCPM BI 40 — tabel sesi + pencarian interaktif</div>
              </div>
            </div>
          </div>
          <div class="text-lg-end">
            <div class="subtle">Total</div>
            <div class="h4 mb-0"><span id="rowCount">-</span></div>
          </div>
        </div>

        <hr class="my-4 hr-soft" />

        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-4 col-lg-3">
            <label class="form-label subtle mb-1">Filter hari</label>
            <select id="filterDay" class="form-select">
              <option value="">Semua</option>
            </select>
          </div>
          <div class="col-6 col-md-4 col-lg-3">
            <label class="form-label subtle mb-1">Filter bulan</label>
            <select id="filterMonth" class="form-select">
              <option value="">Semua</option>
            </select>
          </div>
          <div class="col-12 col-md-4 col-lg-3 d-md-none">
            <label class="form-label subtle mb-1">Cari (mobile)</label>
            <input id="mobileSearch" class="form-control" placeholder="Cari modul / Open ID…" />
          </div>
          <div class="col-12 col-lg-6 d-flex justify-content-lg-end">
            <button id="btnReset" class="btn btn-outline-primary w-100 w-lg-auto">Reset filter</button>
          </div>
        </div>

        <div class="mt-4">
          <!-- Desktop/tablet -->
          <div class="table-responsive d-none d-md-block">
            <table id="scheduleTable" class="table table-hover align-middle" style="width: 100%">
              <thead>
                <tr>
                  <th style="width: 110px">Open ID</th>
                  <th>Modul / Sesi</th>
                  <th style="width: 260px">Tanggal</th>
                  <th style="width: 160px" class="text-end">Aksi</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <!-- Mobile/cards -->
          <div class="d-md-none">
            <div class="d-flex align-items-center justify-content-between mb-2">
              <div class="subtle" style="font-size: 12px;">
                Menampilkan <span id="mobileShown">0</span> dari <span id="mobileTotal">0</span>
              </div>
            </div>
            <div id="mobileList" class="mobile-list"></div>
          </div>

          <div class="subtle mt-2" style="font-size: 12px;">
            Catatan: tombol “Buka evaluasi” membuka halaman BI LMS berdasarkan <code>open_id</code> di tab baru.
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
